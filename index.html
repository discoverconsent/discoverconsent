  for (let i = 0; i < TOTAL; i++) s += answersObj[i] || 'U';
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

function decode(enc) {
  try {
    const b64 = enc.replace(/-/g,'+').replace(/_/g,'/');
    const pad = b64 + '=='.slice(0, (4 - b64.length % 4) % 4);
    const s = atob(pad);
    const r = {};
    for (let i = 0; i < TOTAL && i < s.length; i++) {
      if ('YMN'.includes(s[i])) r[i] = s[i];
    }
    return r;
  } catch { return null; }
}

function computeResults(encList) {
  const all = encList.map(decode).filter(Boolean);
  if (!all.length) return [];
  const out = [];
  SECTIONS.forEach((section, si) => {
    const items = [];
    QUESTIONS.filter(q => q.si === si).forEach(q => {
      const responses = all.map(a => a[q.gi] || null);
      if (responses.some(r => !r || r === 'N')) return;
      items.push({ text: q.text, unanimous: responses.every(r => r === 'Y') });
    });
    if (items.length) out.push({ section, items });
  });
  return out;
}

function navigate(path) { window.location.hash = path; }

function render() {
  stopPolling();
  const h = window.location.hash.slice(1) || '/';
  const parts = h.split('/').filter(Boolean);
  const page  = parts[0] || '';
  const rest  = parts.slice(1);

  // Remove noindex from previous results page
  document.querySelectorAll('meta[name="robots"]').forEach(m => m.remove());

  const app = document.getElementById('app');
  let html;

  switch (page) {
    case 'create':   html = pageCreate();                          break;
    case 'join':     html = rest[0] ? pageJoinStart(rest[0]) : pageJoin(); break;
    case 'session':  html = pageSession(rest[0]);                  break;
    case 'survey':   html = pageSurvey(parseInt(rest[0])||0, rest[1]||null); break;
    case 'share':    html = pageShare(rest[0]);                    break;
    case 'aggregate':html = pageAggregate();                       break;
    case 'results':  html = pageResults(rest[0]);                  break;
    case 'privacy':  html = pagePrivacy();                         break;
    case 'about':    html = pageAbout();                           break;
    default:         html = pageHome();
  }

  app.innerHTML = html;
  app.classList.remove('fade-in');
  void app.offsetWidth;
  app.classList.add('fade-in');

  window.scrollTo({ top: 0, behavior: 'instant' });
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;

  // Post-render hooks
  if (page === 'create')  initCreate();
  if (page === 'session') initSession(rest[0]);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

function initSession(code) {
  if (!code) return;
  fetchSessionResults(code);
  pollInterval = setInterval(() => fetchSessionResults(code), 10000);
}

function fetchSessionResults(code) {
  fetch(`/api/session/${code}`)
    .then(r => {
      if (!r.ok) throw new Error('not found');
      return r.json();
    })
    .then(data => {
      const el = document.getElementById('session-results');
      if (!el) { stopPolling(); return; }

      const count = data.count;
      const answers = data.answers || [];

      let html = `
        <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px;">
          <span class="participant-count">${count}</span>
          <span style="font-size:13px;color:var(--text-2);">participant${count!==1?'s':''} submitted</span>
        </div>`;

      if (count < 2) {
        html += `<p class="body-sm mt-4">Waiting for at least one more person to submit before results can be shown.</p>
          <p class="body-sm mt-3">Share the invite link above with your group.</p>`;
      } else {
        const results = computeResults(answers);
        html += ResultsHTML(results, count);
      }

      el.innerHTML = html;
    })
    .catch(() => {
      const el = document.getElementById('session-results');
      if (el) el.innerHTML = `<p style="font-size:14px;color:var(--accent);">Session not found or expired.</p><p class="body-sm mt-3"><a href="#/create" class="inline-link">Create a new session</a></p>`;
      stopPolling();
    });
}

function pageSurvey(si, sessionCode) {
  si = Math.max(0, Math.min(si, SECTIONS.length - 1));
  const section   = SECTIONS[si];
  const sectionQs = QUESTIONS.filter(q => q.si === si);
  const answeredHere  = sectionQs.filter(q => answers[q.gi]).length;
  const sectionDone   = answeredHere === sectionQs.length;
  const totalAnswered = Object.keys(answers).length;
  const pct = Math.round((totalAnswered / TOTAL) * 100);
  const isLast = si === SECTIONS.length - 1;

  const pills = SECTIONS.map((_, i) => {
    const done = QUESTIONS.filter(q => q.si === i).every(q => answers[q.gi]);
    return `<div class="section-pill ${done?'done':i===si?'active':''}"></div>`;
  }).join('');

  const n = s => `q${s.gi}`;
  const qRows = sectionQs.map(q => {
    const cur = answers[q.gi];
    return `<div class="question-item">
      <div class="question-text">${q.text}</div>
      <div class="answer-group">
        <input type="radio" class="answer-input" name="${n(q)}" id="${n(q)}-Y" value="Y" data-qi="${q.gi}" ${cur==='Y'?'checked':''}>

        <label class="answer-btn ans-N" for="${n(q)}-N">No</label>
      </div>
    </div>`;
  }).join('');

  const remaining = sectionQs.length - answeredHere;
  const hintText = sectionDone
    ? '✓ Section complete — you can continue'
    : `${remaining} question${remaining!==1?'s':''} left in this section`;

  const sc = sessionCode || '';
  const backHash = sc ? `/survey/${si-1}/${sc}` : `/survey/${si-1}`;
  const nextHash = sc ? `/survey/${si+1}/${sc}` : `/survey/${si+1}`;

  const sessionIndicator = sc ? `<span class="session-badge" style="margin-left:8px;">Session ${sc}</span>` : '';

  return `${Nav()}
  <div class="survey-header">
    <div class="survey-meta">
      <span class="label">Section ${si+1} of ${SECTIONS.length} ${sessionIndicator}</span>
      <span class="label">${totalAnswered} / ${TOTAL} answered</span>

    <div class="section-pills mt-2">${pills}</div>
  </div>

  <main class="page">
    <div class="section-intro">
      <div class="section-num">${section.subtitle}</div>
      <h2 class="section-title">${section.title}</h2>
    </div>
    <div class="questions-list" id="qlist">${qRows}</div>
    <div class="survey-nav" id="survey-nav" data-si="${si}" data-session="${sc}">
      ${si > 0 ? `<button class="btn btn-ghost" data-a="back" data-hash="${backHash}">← Back</button>` : ''}
      ${isLast
        ? `<button class="btn btn-primary" id="finish-btn" data-a="finish" data-si="${si}" data-session="${sc}" ${sectionDone?'':'disabled'}>${sc ? 'Submit to Session →' : 'Get My Link'}</button>`
        : `<button class="btn btn-primary" id="next-btn" data-a="next" data-hash="${nextHash}" data-si="${si}" ${sectionDone?'':'disabled'}>Continue →</button>`
      }
    </div>
    <p class="survey-hint ${sectionDone?'ok':''}" id="hint">${hintText}</p>
  </main>
  ${Footer()}`;
}

  if (!encodedStr) { navigate('/aggregate'); return ''; }
  const m = document.createElement('meta');
  m.name = 'robots'; m.content = 'noindex,nofollow';
  document.head.appendChild(m);

  const encList = encodedStr.split('.').filter(Boolean);
  const results  = computeResults(encList);
  const origin   = window.location.origin + window.location.pathname;
  const resultsUrl = `${origin}#/results/${encodedStr}`;

  return `${Nav()}
  <main class="page">
    ${ResultsHTML(results, encList.length)}
    <div class="divider"></div>
    <div class="card card-sm mb-3">
      <p class="label mb-3">Share these results</p>
      <div class="share-link-box" style="font-size:11px;">${resultsUrl}</div>
      <button class="btn btn-ghost btn-full btn-sm mt-2" data-a="copy" data-url="${resultsUrl}" id="copy-btn">Copy Results Link</button>
      <span class="copy-confirm" id="copy-ok">✓ Copied</span>
    </div>
    <div style="display:flex;gap:10px;">
      <a href="#/survey/0" class="btn btn-ghost" style="flex:1;font-size:13px;">Retake</a>
      <a href="#/aggregate" class="btn btn-ghost" style="flex:1;font-size:13px;">New Results</a>
    </div>
  </main>
  ${Footer()}`;
}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════

function refreshSurveyState() {
  const navDiv = document.getElementById('survey-nav');
  if (!navDiv) return;
  const si  = parseInt(navDiv.dataset.si ?? 0);
  const sqs = QUESTIONS.filter(q => q.si === si);
  const done = sqs.every(q => answers[q.gi]);

  const btn = document.querySelector('[data-a="next"], [data-a="finish"]');
  if (btn) btn.disabled = !done;

  const hint = document.getElementById('hint');
  if (hint) {
    const rem = sqs.length - sqs.filter(q => answers[q.gi]).length;
    hint.textContent = done ? '✓ Section complete — you can continue'
      : `${rem} question${rem!==1?'s':''} left in this section`;
    hint.className = 'survey-hint' + (done ? ' ok' : '');
  }

  const prog = document.getElementById('prog');
  if (prog) {
    const pct = Math.round((Object.keys(answers).length / TOTAL) * 100);
    prog.style.width = pct + '%';
    const meta = document.querySelector('.survey-meta .label:last-child');
    if (meta) meta.textContent = `${Object.keys(answers).length} / ${TOTAL} answered`;
  }
}

// Radio change — save answer + update UI
document.addEventListener('change', function(e) {
  const input = e.target.closest('.answer-input');
  if (!input) return;
  answers[parseInt(input.dataset.qi)] = input.value;
  refreshSurveyState();
});

// All click actions
document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-a]');
  if (!el) return;
  const a = el.dataset.a;

  if (a === 'back') { navigate(el.dataset.hash); return; }

  if (a === 'next') {
    const si  = parseInt(el.dataset.si);
    const sqs = QUESTIONS.filter(q => q.si === si);
    if (sqs.every(q => answers[q.gi])) navigate(el.dataset.hash);
    return;
  }

  if (a === 'finish') {
    const si  = SECTIONS.length - 1;
    const sqs = QUESTIONS.filter(q => q.si === si);
    if (!sqs.every(q => answers[q.gi])) return;
    const encoded = encode(answers);
    const sc = el.dataset.session;
    if (sc) {
      el.disabled = true;
      el.textContent = 'Submitting…';
      fetch(`/api/session/${sc}/submit`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({encoded})
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) navigate(`/session/${sc}`);
        else { el.disabled = false; el.textContent = 'Submit to Session →'; alert('Error: ' + data.error); }
      })
      .catch(() => { el.disabled = false; el.textContent = 'Submit to Session →'; alert('Network error — please try again.'); });
    } else {
      navigate(`/share/${encoded}`);
    }
    return;
  }

  if (a === 'join-submit') {
    const code = (document.getElementById('code-input')?.value || '').trim().toUpperCase();
    const err  = document.getElementById('join-error');
    if (!code || code.length !== 6) {
      if (err) { err.textContent = 'Please enter a 6-character session code.'; err.classList.add('show'); }
      return;
    }
    fetch(`/api/session/${code}`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(() => navigate(`/join/${code}`))
      .catch(() => {
        if (err) { err.textContent = 'Session not found or expired. Check the code and try again.'; err.classList.add('show'); }
      });
    return;
  }

  if (a === 'refresh-session') {
    fetchSessionResults(el.dataset.code);
    return;
  }

  if (a === 'copy') {
    const url = el.dataset.url;
    const ok  = document.getElementById('copy-ok');
    navigator.clipboard.writeText(url).then(() => {
      const orig = el.textContent;
      el.textContent = '✓ Copied!';
      if (ok) ok.classList.add('show');
      setTimeout(() => { el.textContent = orig; if (ok) ok.classList.remove('show'); }, 2500);
    }).catch(() => {
      const box = document.querySelector('.share-link-box');
      if (box) { const sel = window.getSelection(); const r = document.createRange(); r.selectNodeContents(box); sel.removeAllRanges(); sel.addRange(r); }
    });
    return;
  }

  if (a === 'compute') {
    const ta  = document.getElementById('links-in');
    const err = document.getElementById('agg-err');
    err.classList.remove('show');
    const lines = (ta?.value || '').split('\n').map(l => l.trim()).filter(Boolean);
    const encs  = lines.map(l => { const m = l.match(/#\/share\/([A-Za-z0-9_-]+)/); return m ? m[1] : (/^[A-Za-z0-9_-]{20,}$/.test(l) ? l : null); }).filter(Boolean);
    if (!encs.length) { err.textContent = 'No valid share links found.'; err.classList.add('show'); return; }
    navigate(`/results/${encs.join('.')}`);
    return;
  }
});

// Auto-handle #/join/{code} — validate then redirect to survey
function maybeInitJoin() {
  const h = window.location.hash.slice(1) || '/';
  const parts = h.split('/').filter(Boolean);
  if (parts[0] === 'join' && parts[1]) {
    const code = parts[1].toUpperCase();
    fetch(`/api/session/${code}`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(() => navigate(`/survey/0/${code}`))
      .catch(() => {
        document.getElementById('app').innerHTML = `${Nav()}
          <main class="page">
            <div style="padding-top:48px;text-align:center;">
              <h2 class="heading">Session not found</h2>
              <p class="body-sm mt-4">This session code is invalid or has expired.</p>
              <div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:24px auto 0;">
                <a href="#/join" class="btn btn-ghost btn-full">Try Another Code</a>
                <a href="#/create" class="btn btn-primary btn-full">Create a Session</a>
              </div>
            </div>
          </main>${Footer()}`;
      });
  }
}

window.addEventListener('hashchange', () => {
  render();
  maybeInitJoin();

render();
maybeInitJoin();

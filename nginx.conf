# discoverconsent.com — Nginx configuration
# Place in /etc/nginx/conf.d/discoverconsent.conf
# Assumes Cloudflare handles SSL termination (Full or Full Strict mode)
# If using Let's Encrypt directly, adjust the ssl_certificate paths.

# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.discoverconsent.com;
    return 301 https://discoverconsent.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name discoverconsent.com;

    # If Cloudflare proxies traffic, it handles HTTPS and sends HTTP to origin.
    # Remove the redirect below if using Cloudflare proxy (orange cloud).
    # return 301 https://discoverconsent.com$request_uri;

    root /var/www/discoverconsent;
    index index.html;

    # ── Single-page app: all routes serve index.html ──
    # Hash routing means the server only ever sees / anyway,
    # but this catch-all is here for safety.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache control ──
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    location ~* \.(txt|xml|ico|png|jpg|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript text/xml;
    gzip_min_length 1024;

    # ── Access logging ──
    # Note: hash fragments (#/results/, #/share/) are NEVER sent to the server
    # by browsers — they are purely client-side. So no result data is logged
    # even in standard access logs. This is by design.
    access_log /var/log/nginx/discoverconsent.access.log;
    error_log /var/log/nginx/discoverconsent.error.log;
}
